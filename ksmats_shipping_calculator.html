<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSMATS 배송비 계산기</title>
<style>
  :root{
    --navy:#0A1E3A;
    --navy-light:#16305A;
    --orange:#FF6A00;
    --bg:#F5F3EF;
    --card:#FFFFFF;
    --line:#E4E1D8;
    --text:#1C2430;
    --muted:#767A82;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    background-image:radial-gradient(circle, #00000008 1px, transparent 1px);
    background-size:16px 16px;
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    color:var(--text);
    padding:32px 16px 64px;
  }
  .wrap{max-width:480px;margin:0 auto;}
  .eyebrow{
    text-align:center;font-size:12px;letter-spacing:.14em;font-weight:700;
    color:var(--orange);text-transform:uppercase;margin-bottom:8px;
  }
  h1{
    text-align:center;font-size:24px;font-weight:800;color:var(--navy);
    margin:0 0 6px;letter-spacing:-.01em;
  }
  .sub{
    text-align:center;color:var(--muted);font-size:14px;margin:0 0 28px;line-height:1.5;
  }
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:24px;margin-bottom:16px;
  }
  label{
    display:block;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:8px;
  }
  .field{margin-bottom:20px;}
  .field:last-child{margin-bottom:0;}

  .addr-btn{
    width:100%;padding:13px 14px;border:1.5px dashed var(--line);border-radius:10px;
    background:#FAFAF8;color:var(--navy);font-size:15px;font-weight:700;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .addr-btn:hover{border-color:var(--orange);background:#FFF6EE;}
  .addr-card{
    display:none;background:#FFF6EE;border:1px solid #FFD9B8;border-radius:10px;
    padding:14px;
  }
  .addr-card.show{display:block;}
  .addr-main{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:2px;}
  .addr-postal{font-size:12px;color:var(--muted);margin-bottom:10px;}
  .addr-detail-input{
    width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:8px;
    font-size:13px;background:#fff;margin-bottom:10px;
  }
  .addr-change{
    background:none;border:none;color:var(--orange);font-weight:700;font-size:13px;
    cursor:pointer;padding:0;
  }
  .addr-error{
    display:none;margin-top:10px;background:#FDEDED;border:1px solid #F5B8B8;
    border-radius:10px;padding:12px 14px;font-size:13px;color:#A32D2D;line-height:1.5;
  }
  .addr-error.show{display:block;}

  .postcode-overlay{
    display:none;position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(10,30,58,.55);z-index:999;align-items:center;justify-content:center;
    padding:16px;
  }
  .postcode-overlay.show{display:flex;}
  .postcode-modal{
    background:#fff;border-radius:12px;overflow:hidden;width:100%;max-width:480px;
    max-height:88vh;display:flex;flex-direction:column;
  }
  .postcode-header{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 18px;border-bottom:1px solid var(--line);font-weight:700;color:var(--navy);
    font-size:15px;flex-shrink:0;
  }
  .postcode-header button{
    background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:4px;
  }
  #postcode-embed-target{width:100%;height:480px;}

  .qty-row{display:flex;align-items:center;gap:12px;}
  .qty-btn{
    width:40px;height:40px;border-radius:10px;border:1px solid var(--line);
    background:#FAFAF8;font-size:18px;font-weight:700;color:var(--navy);cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .qty-btn:active{background:var(--orange);color:#fff;border-color:var(--orange);}
  .qty-value{
    flex:1;text-align:center;font-size:20px;font-weight:800;color:var(--navy);
  }
  .qty-hint{font-size:12px;color:var(--muted);margin-top:8px;text-align:center;}

  .result-card{
    background:var(--navy);border-radius:16px;padding:24px;color:#fff;
    display:none;
  }
  .result-card.show{display:block;}
  .result-row{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:9px 0;border-bottom:1px solid rgba(255,255,255,.12);
  }
  .result-row:last-of-type{border-bottom:none;}
  .result-row .k{font-size:13px;color:#B9C2D4;}
  .result-row .v{font-size:14px;font-weight:700;}
  .final-fee{text-align:center;padding-top:18px;margin-top:8px;}
  .final-fee .label{font-size:12px;color:#B9C2D4;margin-bottom:4px;}
  .final-fee .amount{font-size:32px;font-weight:800;color:var(--orange);letter-spacing:-.01em;}
  .cta-row{display:flex;gap:10px;margin-top:20px;}
  .cta-btn{
    flex:1;padding:13px 10px;border-radius:10px;font-size:14px;font-weight:700;
    text-align:center;text-decoration:none;cursor:pointer;border:none;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .cta-sms{background:rgba(255,255,255,.12);color:#fff;}
  .cta-sms:hover{background:rgba(255,255,255,.2);}
  .cta-call{background:var(--orange);color:#fff;}
  .cta-call:hover{background:#E85F00;}
  .disclaimer{
    font-size:12px;color:var(--muted);text-align:center;margin-top:18px;line-height:1.6;
    padding:0 8px;
  }
  .origin-card{
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:20px 24px;margin-bottom:16px;
  }
  .origin-card .origin-label{
    font-size:13px;font-weight:700;color:var(--navy);margin-bottom:12px;
  }
  .origin-grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:8px;
  }
  .origin-chip{
    background:#FAFAF8;border:1px solid var(--line);border-radius:10px;
    padding:10px 6px;text-align:center;font-size:13px;font-weight:700;color:var(--muted);
  }
  .origin-chip.active{
    background:var(--navy);border-color:var(--navy);color:#fff;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">KSMATS SHIPPING</div>
  <h1>배송비 계산기</h1>
  <p class="sub">현무암 디딤석 배송 주소와 수량을 입력하면<br>예상 배송비를 바로 확인할 수 있어요</p>

  <div class="origin-card">
    <div class="origin-label">KSMATS 전국 5개 출고지</div>
    <div class="origin-grid" id="origin-grid">
      <div class="origin-chip" data-origin="평택">평택</div>
      <div class="origin-chip" data-origin="광양">광양</div>
      <div class="origin-chip" data-origin="보령">보령</div>
      <div class="origin-chip" data-origin="대구">대구</div>
      <div class="origin-chip" data-origin="원주">원주</div>
    </div>
  </div>

  <div class="card">
    <div class="field">
      <label>배송받으실 주소</label>
      <button type="button" class="addr-btn" id="addr-search-btn">주소 검색</button>
      <div class="addr-card" id="addr-card">
        <div class="addr-postal" id="addr-postal"></div>
        <div class="addr-main" id="addr-main"></div>
        <input type="text" class="addr-detail-input" id="addr-detail" placeholder="상세주소 (동/호수 등, 선택)">
        <button type="button" class="addr-change" id="addr-change-btn">주소 변경</button>
      </div>
      <div class="addr-error" id="addr-error"></div>
    </div>

    <div class="postcode-overlay" id="postcode-overlay">
      <div class="postcode-modal">
        <div class="postcode-header">
          <span>주소 검색</span>
          <button type="button" id="postcode-close">닫기</button>
        </div>
        <div id="postcode-embed-target"></div>
      </div>
    </div>

    <div class="field">
      <label>디딤석 필요 수량 (1개 = 1파렛트)</label>
      <div class="qty-row">
        <button class="qty-btn" id="qty-minus">−</button>
        <div class="qty-value" id="qty-value">1개</div>
        <button class="qty-btn" id="qty-plus">+</button>
      </div>
      <div class="qty-hint" id="qty-hint">필요 차량: 1톤 1대 기준</div>
    </div>
  </div>

  <div class="result-card" id="result-card">
    <div class="result-row"><span class="k">담당 출고지</span><span class="v" id="r-origin">-</span></div>
    <div class="result-row"><span class="k">실제 도로거리</span><span class="v" id="r-distance">-</span></div>
    <div class="result-row"><span class="k">필요 차량</span><span class="v" id="r-truck">-</span></div>
    <div class="final-fee">
      <div class="label">예상 배송비</div>
      <div class="amount" id="r-fee">-</div>
    </div>
    <div class="cta-row">
      <a href="#" class="cta-btn cta-sms" id="btn-sms">문자로 결과 받기</a>
      <a href="tel:1644-1154" class="cta-btn cta-call">전화 상담 1644-1154</a>
    </div>
  </div>

  <p class="disclaimer">위 금액은 조회된 데이터를 기준으로 한 예상 배송비이며,<br>도로 상황·물량에 따라 실제 청구 금액과 다를 수 있습니다.<br>정확한 배송비는 주문 확인 후 안내드립니다.</p>
</div>

const TONNAGE_TABLE = [
  {max:1, label:"1톤", key:"1"},
  {max:3, label:"3.5톤", key:"3.5"},
  {max:5, label:"5톤", key:"5"},
  {max:15, label:"15톤", key:"15"},
  {max:16, label:"25톤", key:"25"},
];

function pickTonnage(qty){
  for(const t of TONNAGE_TABLE){
    if(qty <= t.max) return t;
  }
  return TONNAGE_TABLE[TONNAGE_TABLE.length-1];
}

const METRO_MAP = {
  "서울":"서울특별시","부산":"부산광역시","대구":"대구광역시","인천":"인천광역시",
  "광주":"광주광역시","대전":"대전광역시","울산":"울산광역시",
  "세종":"세종특별자치시","세종특별자치시":"세종특별자치시"
};

function matchFromPostcode(data){
  const sido = data.sido || '';
  const sigungu = data.sigungu || '';
  if(METRO_MAP[sido]) return DATA.find(d => d.region === METRO_MAP[sido]) || null;
  let candidates = DATA.filter(d => d.region.replace('(강원)','').replace('(경남)','') === sigungu);
  if(candidates.length > 1){
    if(sido.includes('강원')) candidates = candidates.filter(d => d.region.includes('(강원)'));
    else if(sido.includes('경남') || sido.includes('경상남도')) candidates = candidates.filter(d => d.region.includes('(경남)'));
  }
  return candidates[0] || null;
}

function openPostcode(){
  addrError.classList.remove('show');
  postcodeTarget.innerHTML = '';
  new daum.Postcode({
    oncomplete: function(data){
      postcodeOverlay.classList.remove('show');
      const matched = matchFromPostcode(data);
      fullAddressText = data.roadAddress || data.address;
      if(!matched){
        addrCard.classList.remove('show');
        addrBtn.style.display = 'flex';
        selectedRegion = null;
        resultCard.classList.remove('show');
        addrError.innerHTML = `<strong>${fullAddressText}</strong><br>이 지역은 아직 배송비 데이터가 없어요. 1644-1154로 문의해주세요.`;
        addrError.classList.add('show');
        return;
      }
      selectedRegion = matched;
      addrPostal.textContent = `[${data.zonecode}]`;
      addrMain.textContent = fullAddressText;
      addrCard.classList.add('show');
      addrBtn.style.display = 'none';
      compute();
    },
    width: '100%',
    height: '100%'
  }).embed(postcodeTarget);
  postcodeOverlay.classList.add('show');
}

postcodeCloseBtn.addEventListener('click', () => {
  postcodeOverlay.classList.remove('show');
});

document.getElementById('qty-plus').addEventListener('click', () => {
  qty = Math.min(16, qty + 1);
  updateQty();
});

function updateQty(){
  qtyValue.textContent = qty + '개';
  const t = pickTonnage(qty);
  if(qty >= 16){
    qtyHint.textContent = `필요 차량: ${t.label} 1대 기준 (최대 적재량, 초과 시 별도 문의)`;
  } else {
    qtyHint.textContent = `필요 차량: ${t.label} 1대 기준`;
  }
  compute();
}

function compute(){
  if(!selectedRegion){
    resultCard.classList.remove('show');
    originChips.forEach(c => c.classList.remove('active'));
    return;
  }
  const t = pickTonnage(qty);
  const fee = selectedRegion.fee[t.key];
  document.getElementById('r-origin').textContent = selectedRegion.origin + ' 출고지';
  document.getElementById('r-distance').textContent = selectedRegion.distance + 'km';
  document.getElementById('r-truck').textContent = t.label + ' 차량';
  document.getElementById('r-fee').textContent = fee.toLocaleString('ko-KR') + '원';
  resultCard.classList.add('show');

  originChips.forEach(c => {
    c.classList.toggle('active', c.dataset.origin === selectedRegion.origin);
  });

  const addr = (fullAddressText || selectedRegion.region) + (addrDetail.value.trim() ? ' ' + addrDetail.value.trim() : '');
  const smsBody =
`[KSMATS 디딤석 배송비 조회]
배송지: ${addr}
담당출고지: ${selectedRegion.origin}
실제거리: ${selectedRegion.distance}km
필요차량: ${t.label}
수량: ${qty}개
예상배송비: ${fee.toLocaleString('ko-KR')}원`;
  btnSms.href = `sms:010-5067-5532?body=${encodeURIComponent(smsBody)}`;
}
</script>
</body>
</html>
