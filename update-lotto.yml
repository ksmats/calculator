name: 로또 데이터 자동 갱신

on:
  schedule:
    # 매주 토요일 UTC 16:00 = 한국시간 일요일 01:00 (토요일 추첨 결과 반영 후)
    - cron: "0 16 * * 6"
  workflow_dispatch: {}   # Actions 탭에서 수동 실행도 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: 데이터 갱신 스크립트 실행
        run: python scripts/update_lotto.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "lotto-auto-update"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add "로또번호생성기.html"
            git commit -m "chore: 로또 당첨번호 자동 갱신 $(date -u +'%Y-%m-%d')"
            git push
          else
            echo "변경 사항 없음, 커밋 생략"
          fi
